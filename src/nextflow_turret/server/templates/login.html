<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Nextflow Turret</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2d3148;
    --accent:  #4f8ef7;
    --danger:  #e05050;
    --text:    #e2e4ef;
    --text-dim:#9da3ba;
    --font: "Inter", "Segoe UI", system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 36px 40px; width: 100%; max-width: 380px; }
  .logo { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .subtitle { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 28px; }
  .form-row { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  input[type=text], input[type=password] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 9px 12px; font-size: 14px;
    font-family: var(--font); outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  .btn { display: block; width: 100%; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; background: var(--accent); color: #fff; margin-top: 20px; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; background: rgba(224,80,80,0.12); border: 1px solid var(--danger); color: var(--danger); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎯 Nextflow Turret</div>
  <div class="subtitle">Sign in to continue</div>

  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/auth/login">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-row">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
</body>
</html>
