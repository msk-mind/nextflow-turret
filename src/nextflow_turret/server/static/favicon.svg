<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f1117"/>

  <!-- Gun barrel -->
  <rect x="34" y="14" width="22" height="7" rx="3.5" fill="#4f8ef7"/>

  <!-- Turret dome (rounded top) -->
  <ellipse cx="28" cy="31" rx="14" ry="8" fill="#1a1d27" stroke="#4f8ef7" stroke-width="2"/>

  <!-- Turret body / base block -->
  <rect x="14" y="31" width="28" height="16" rx="2" fill="#1a1d27" stroke="#4f8ef7" stroke-width="2"/>

  <!-- Track / base platform -->
  <rect x="10" y="47" width="36" height="8" rx="4" fill="#2d3148" stroke="#4f8ef7" stroke-width="1.5"/>

  <!-- Track wheel circles -->
  <circle cx="18" cy="51" r="3" fill="#4f8ef7" opacity="0.7"/>
  <circle cx="28" cy="51" r="3" fill="#4f8ef7" opacity="0.7"/>
  <circle cx="38" cy="51" r="3" fill="#4f8ef7" opacity="0.7"/>

  <!-- Targeting reticle highlight on dome -->
  <circle cx="28" cy="31" r="4" fill="#4f8ef7" opacity="0.25"/>
  <circle cx="28" cy="31" r="2" fill="#4f8ef7" opacity="0.6"/>

  <!-- Accent crosshair lines on dome -->
  <line x1="28" y1="27" x2="28" y2="23" stroke="#4f8ef7" stroke-width="1.5" opacity="0.5"/>
  <line x1="22" y1="31" x2="18" y2="31" stroke="#4f8ef7" stroke-width="1.5" opacity="0.5"/>
</svg>
