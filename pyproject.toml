[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nextflow-turret"
version = "0.1.0"
description = "In-process Nextflow Tower API shim — accumulate -with-tower trace events without a Seqera Platform subscription"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = []   # stdlib only

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
